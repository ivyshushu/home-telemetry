# mosquitto.conf — Mosquitto MQTT broker configuration
#
# Mounted into the Mosquitto container at /mosquitto/config/mosquitto.conf.
# This is a development configuration: anonymous access is allowed and there
# is no TLS. Do not use this config in production (see NF-04, MQ-02).
#
# WHY ANONYMOUS ACCESS?
# During development, both mock_sensor.py and the Rust gateway connect without
# credentials. Enforcing auth at this stage would add friction with no security
# benefit on a local Docker network. When this stack moves to the Raspberry Pi
# (Phase 7), consider adding password_file authentication.

# -------------------------------------------------------------------------
# Listener
# -------------------------------------------------------------------------
# Accept MQTT connections on port 1883 on all interfaces.
# Binding to 0.0.0.0 lets both the host machine (for mock_sensor.py running
# on the laptop) and Docker-networked services (the Rust gateway container)
# reach the broker at the same port.
listener 1883 0.0.0.0

# -------------------------------------------------------------------------
# Authentication
# -------------------------------------------------------------------------
# allow_anonymous true — any client may connect without a username/password.
# Required for Mosquitto 2.x, which defaults to deny-all. Without this line,
# mock_sensor.py and the gateway will be refused with CONNACK rc=5.
allow_anonymous true

# -------------------------------------------------------------------------
# Persistence
# -------------------------------------------------------------------------
# Persist the broker's in-flight message state to disk so that subscriptions
# and retained messages survive a container restart. The path is inside the
# container; mount a Docker volume here if you want persistence across
# container recreation (not strictly needed for dev, but cheap to enable).
persistence true
persistence_location /mosquitto/data/

# -------------------------------------------------------------------------
# Logging
# -------------------------------------------------------------------------
# Log to stdout so `docker compose logs mosquitto` captures everything.
# Log level: all (connections, disconnections, subscriptions, publishes).
# In production, switch to 'error' or 'warning' to reduce noise.
log_dest stdout
log_type all
